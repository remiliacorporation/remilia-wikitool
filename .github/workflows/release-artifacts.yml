name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      artifact_version:
        description: "Release version, bare semver (example: 0.3.1)"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release and attach zips"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary_name: wikitool
          # macos-26 is arm64; macos-26-intel is x64. Keep these explicit so
          # each artifact is built on the native architecture it ships for.
          - os: macos-26-intel
            target: x86_64-apple-darwin
            platform: macos-x86_64
            binary_name: wikitool
          - os: macos-26
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary_name: wikitool
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary_name: wikitool.exe

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Resolve release names
        id: names
        shell: bash
        run: |
          # Release versions are bare semver (no leading v); strip one if present.
          re='^v?[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'
          if [[ ! "${RAW}" =~ $re ]]; then
            echo "Invalid artifact_version: ${RAW}"
            echo "Expected a bare semver version, e.g. 0.3.1"
            exit 1
          fi
          version="${RAW#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "bundle=wikitool-${version}-${{ matrix.platform }}" >> "$GITHUB_OUTPUT"
        env:
          RAW: ${{ inputs.artifact_version }}

      - name: Build + package versioned release bundle
        run: >
          cargo run --quiet --package wikitool --features maintainer --
          release build-matrix
          --targets ${{ matrix.target }}
          --artifact-version ${{ steps.names.outputs.version }}
          --output-dir dist/release-matrix

      - name: Verify packaged release (Unix)
        if: runner.os != 'Windows'
        env:
          BUNDLE: dist/release-matrix/${{ steps.names.outputs.bundle }}
        run: |
          test -f "$BUNDLE/${{ matrix.binary_name }}"
          test -f "$BUNDLE/AGENTS.md"
          test -f "$BUNDLE/CLAUDE.md"
          test -d "$BUNDLE/.claude/rules"
          test -d "$BUNDLE/.claude/skills"
          cmp -s "$BUNDLE/AGENTS.md" "$BUNDLE/CLAUDE.md"
          test -d "$BUNDLE/writing_context"
          test ! -e "$BUNDLE/llm_instructions"
          test ! -e "$BUNDLE/SETUP.md"
          test -f "$BUNDLE/manifest.json"
          test -f "$BUNDLE/contextmink/contextmink"
          test -f "$BUNDLE/contextmink/README.md"
          test -f "$BUNDLE/contextmink/SETUP.md"
          test -d "$BUNDLE/contextmink/templates"
          test ! -e "$BUNDLE/contextmink/contextmink-bridge"
          "$BUNDLE/contextmink/contextmink" --version
          test -f "${BUNDLE}.zip"

      - name: Verify packaged release (Windows)
        if: runner.os == 'Windows'
        env:
          BUNDLE: dist/release-matrix/${{ steps.names.outputs.bundle }}
        run: |
          if (!(Test-Path "$env:BUNDLE/${{ matrix.binary_name }}")) { throw "release binary missing" }
          if (!(Test-Path "$env:BUNDLE/AGENTS.md")) { throw "AGENTS.md missing" }
          if (!(Test-Path "$env:BUNDLE/CLAUDE.md")) { throw "CLAUDE.md missing" }
          if (!(Test-Path "$env:BUNDLE/.claude/rules")) { throw ".claude/rules missing" }
          if (!(Test-Path "$env:BUNDLE/.claude/skills")) { throw ".claude/skills missing" }
          $agentsHash = (Get-FileHash -Path "$env:BUNDLE/AGENTS.md" -Algorithm SHA256).Hash
          $claudeHash = (Get-FileHash -Path "$env:BUNDLE/CLAUDE.md" -Algorithm SHA256).Hash
          if ($agentsHash -ne $claudeHash) { throw "AGENTS.md and CLAUDE.md mismatch" }
          if (!(Test-Path "$env:BUNDLE/writing_context")) { throw "writing_context missing" }
          if (Test-Path "$env:BUNDLE/llm_instructions") { throw "legacy llm_instructions directory must not ship" }
          if (Test-Path "$env:BUNDLE/SETUP.md") { throw "SETUP.md must not ship" }
          if (!(Test-Path "$env:BUNDLE/manifest.json")) { throw "manifest.json missing" }
          if (!(Test-Path "$env:BUNDLE/contextmink/contextmink.exe")) { throw "contextmink binary missing" }
          if (!(Test-Path "$env:BUNDLE/contextmink/contextmink-bridge.exe")) { throw "contextmink-bridge binary missing" }
          & "$env:BUNDLE/contextmink/contextmink-bridge.exe" --version
          if (!(Test-Path "$env:BUNDLE/contextmink/README.md")) { throw "contextmink README missing" }
          if (!(Test-Path "$env:BUNDLE/contextmink/templates")) { throw "contextmink templates missing" }
          & "$env:BUNDLE/contextmink/contextmink.exe" --version
          if (!(Test-Path "${env:BUNDLE}.zip")) { throw "zip artifact missing" }

      - uses: actions/upload-artifact@v7
        with:
          name: wikitool-release-${{ steps.names.outputs.version }}-${{ matrix.platform }}
          path: dist/release-matrix/${{ steps.names.outputs.bundle }}.zip
          if-no-files-found: error

  publish-release:
    if: inputs.create_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: ver
        run: echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
        env:
          RAW: ${{ inputs.artifact_version }}

      - uses: actions/download-artifact@v8
        with:
          path: release-zips
          pattern: wikitool-release-${{ steps.ver.outputs.version }}-*
          merge-multiple: true

      - name: List downloaded assets
        run: ls -lh release-zips/

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          # Keep a Changelog headings: "## [x.y.z] - date". Capture the body
          # up to the next "## " heading; fail if the section is missing so a
          # release can never ship without written notes.
          awk -v heading="## [${VERSION}]" '
            index($0, heading) == 1 { found = 1; next }
            /^## / { if (found) exit }
            found { print }
          ' CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "CHANGELOG.md has no section for ${VERSION}; add one before releasing." >&2
            exit 1
          fi
          cat release_body.md
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "wikitool ${{ steps.ver.outputs.version }}" \
            --notes-file release_body.md \
            release-zips/*.zip
