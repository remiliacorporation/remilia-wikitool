name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo tests
        run: cargo test --workspace
      - name: Generated CLI reference is current
        run: |
          cargo run --quiet --package wikitool --features maintainer -- docs generate-reference --output /tmp/wikitool-reference.md
          diff -u docs/wikitool/reference.md /tmp/wikitool-reference.md
      - name: Offline CLI regression testbench
        run: bash testbench/cli_tests.sh

  rust-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      # Stable toolchain: avoids the maintenance and spurious red of a pinned
      # nightly. Only goes red on real fmt/clippy issues in committed code.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
