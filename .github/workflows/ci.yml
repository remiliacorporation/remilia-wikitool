name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo tests
        run: cargo test --workspace
      - name: Generated CLI reference is current
        run: |
          cargo run --quiet --package wikitool -- docs generate-reference --output /tmp/wikitool-reference.md
          diff -u docs/wikitool/reference.md /tmp/wikitool-reference.md
      - name: Offline CLI regression testbench
        run: bash testbench/cli_tests.sh

  rust-nightly-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt (nightly)
        run: cargo +nightly fmt --all -- --check
      - name: Clippy (nightly)
        run: cargo +nightly clippy --workspace --all-targets --all-features -- -D warnings
