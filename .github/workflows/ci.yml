name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo tests
        run: cargo test --workspace
      - name: Generated CLI reference is current
        run: |
          cargo run --quiet --package wikitool --features maintainer -- docs generate-reference --output /tmp/wikitool-reference.md
          diff -u docs/wikitool/reference.md /tmp/wikitool-reference.md
      - name: Offline CLI regression testbench
        run: bash testbench/cli_tests.sh

  rust-nightly-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # Pinned nightly: bleeding-edge nightly adds lints that turn this job red
      # with no code change. Bump this date deliberately after validating locally.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-27
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt (pinned nightly)
        run: cargo +nightly-2026-05-27 fmt --all -- --check
      - name: Clippy (pinned nightly)
        run: cargo +nightly-2026-05-27 clippy --workspace --all-targets --all-features -- -D warnings
