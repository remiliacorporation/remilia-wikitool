name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      artifact_version:
        description: "Release version, bare semver (example: 0.1.0)"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release and attach archives"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # contextmink-bridge is Windows-purpose (PowerShell argv mangling,
          # MSYS rewriting, Git Bash discovery); POSIX hosts run bash natively,
          # so only the Windows archive carries the bridge binary. The bridge
          # still compiles and tests on every platform.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary_name: contextmink
            archive_ext: tar.gz
          - os: macos-26-intel
            target: x86_64-apple-darwin
            platform: macos-x86_64
            binary_name: contextmink
            archive_ext: tar.gz
          - os: macos-26
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary_name: contextmink
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary_name: contextmink.exe
            bridge_binary_name: contextmink-bridge.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Resolve release names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          re='^v?[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'
          if [[ ! "${RAW}" =~ $re ]]; then
            echo "Invalid artifact_version: ${RAW}" >&2
            echo "Expected bare semver, for example 0.1.0" >&2
            exit 1
          fi
          version="${RAW#v}"
          bundle="contextmink-${version}-${PLATFORM}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "bundle=${bundle}" >> "$GITHUB_OUTPUT"
          echo "archive=${bundle}.${ARCHIVE_EXT}" >> "$GITHUB_OUTPUT"
        env:
          RAW: ${{ inputs.artifact_version }}
          PLATFORM: ${{ matrix.platform }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage release bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bundle="dist/${{ steps.names.outputs.bundle }}"
          archive="dist/${{ steps.names.outputs.archive }}"
          mkdir -p "${bundle}/docs" "${bundle}/templates"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${bundle}/"
          cp README.md SETUP.md LICENSE LICENSE-SSL LICENSE-VPL "${bundle}/"
          cp -R docs/. "${bundle}/docs/"
          cp -R templates/. "${bundle}/templates/"
          cat > "${bundle}/manifest.json" <<EOF
          {
            "name": "contextmink",
            "version": "${{ steps.names.outputs.version }}",
            "target": "${{ matrix.target }}",
            "platform": "${{ matrix.platform }}",
            "binary": "${{ matrix.binary_name }}",
            "archive": "${{ steps.names.outputs.archive }}"
          }
          EOF
          chmod +x "${bundle}/${{ matrix.binary_name }}"
          tar -czf "${archive}" -C dist "${{ steps.names.outputs.bundle }}"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${{ steps.names.outputs.archive }}" > "${{ steps.names.outputs.archive }}.sha256")
          else
            (cd dist && shasum -a 256 "${{ steps.names.outputs.archive }}" > "${{ steps.names.outputs.archive }}.sha256")
          fi

      - name: Stage release bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "dist/${{ steps.names.outputs.bundle }}"
          $archive = "dist/${{ steps.names.outputs.archive }}"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $bundle
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bridge_binary_name }}" $bundle
          Copy-Item README.md,SETUP.md,LICENSE,LICENSE-SSL,LICENSE-VPL $bundle
          Copy-Item -Recurse docs $bundle
          Copy-Item -Recurse templates $bundle
          $manifest = [ordered]@{
            name = "contextmink"
            version = "${{ steps.names.outputs.version }}"
            target = "${{ matrix.target }}"
            platform = "${{ matrix.platform }}"
            binary = "${{ matrix.binary_name }}"
            bridge_binary = "${{ matrix.bridge_binary_name }}"
            archive = "${{ steps.names.outputs.archive }}"
          } | ConvertTo-Json
          Set-Content -Path "$bundle/manifest.json" -Value $manifest -NoNewline
          Compress-Archive -Path "$bundle/*" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLowerInvariant()
          # LF, no BOM: sha256sum -c on POSIX shells trips over CRLF filenames.
          [System.IO.File]::WriteAllText("${archive}.sha256", "$hash  ${{ steps.names.outputs.archive }}`n")

      - name: Verify packaged release (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bundle="dist/${{ steps.names.outputs.bundle }}"
          test -f "${bundle}/${{ matrix.binary_name }}"
          test -f "${bundle}/README.md"
          test -f "${bundle}/SETUP.md"
          test -f "${bundle}/LICENSE"
          test -f "${bundle}/LICENSE-SSL"
          test -f "${bundle}/LICENSE-VPL"
          test -f "${bundle}/manifest.json"
          test -d "${bundle}/docs"
          test -d "${bundle}/templates"
          "${bundle}/${{ matrix.binary_name }}" --version
          "${bundle}/${{ matrix.binary_name }}" --help > /tmp/contextmink-help.txt
          "${bundle}/${{ matrix.binary_name }}" files --path src --max 1 --max-scan-files 20 > /tmp/contextmink-smoke.txt
          grep -q "CONTEXTMINK_RECEIPT" /tmp/contextmink-smoke.txt
          test -f "dist/${{ steps.names.outputs.archive }}"
          test -f "dist/${{ steps.names.outputs.archive }}.sha256"

      - name: Verify packaged release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "dist/${{ steps.names.outputs.bundle }}"
          $binary = "$bundle/${{ matrix.binary_name }}"
          if (!(Test-Path $binary)) { throw "release binary missing" }
          $bridge = "$bundle/${{ matrix.bridge_binary_name }}"
          if (!(Test-Path $bridge)) { throw "bridge binary missing" }
          & $bridge --version
          $bridgeHelp = & $bridge --help | Out-String
          if ($bridgeHelp -notmatch "argv-b64") { throw "bridge help missing argv-b64" }
          if (!(Test-Path "$bundle/README.md")) { throw "README.md missing" }
          if (!(Test-Path "$bundle/SETUP.md")) { throw "SETUP.md missing" }
          if (!(Test-Path "$bundle/LICENSE")) { throw "LICENSE missing" }
          if (!(Test-Path "$bundle/LICENSE-SSL")) { throw "LICENSE-SSL missing" }
          if (!(Test-Path "$bundle/LICENSE-VPL")) { throw "LICENSE-VPL missing" }
          if (!(Test-Path "$bundle/manifest.json")) { throw "manifest.json missing" }
          if (!(Test-Path "$bundle/docs")) { throw "docs missing" }
          if (!(Test-Path "$bundle/templates")) { throw "templates missing" }
          & $binary --version
          & $binary --help | Out-File -Encoding utf8 "$env:TEMP/contextmink-help.txt"
          & $binary files --path src --max 1 --max-scan-files 20 | Tee-Object -FilePath "$env:TEMP/contextmink-smoke.txt"
          if (!(Select-String -Path "$env:TEMP/contextmink-smoke.txt" -Pattern "CONTEXTMINK_RECEIPT")) {
            throw "smoke output missing receipt"
          }
          if (!(Test-Path "dist/${{ steps.names.outputs.archive }}")) { throw "archive missing" }
          if (!(Test-Path "dist/${{ steps.names.outputs.archive }}.sha256")) { throw "checksum missing" }

      - uses: actions/upload-artifact@v4
        with:
          name: contextmink-release-${{ steps.names.outputs.version }}-${{ matrix.platform }}
          path: |
            dist/${{ steps.names.outputs.archive }}
            dist/${{ steps.names.outputs.archive }}.sha256
          if-no-files-found: error

  publish-release:
    if: inputs.create_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          version="${RAW#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
        env:
          RAW: ${{ inputs.artifact_version }}

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: contextmink-release-${{ steps.ver.outputs.version }}-*
          merge-multiple: true

      - name: List downloaded assets
        run: ls -lh release-assets/

      - name: Guard CHANGELOG.md against mojibake
        shell: bash
        run: |
          set -euo pipefail
          # Release bodies are extracted verbatim from CHANGELOG.md, so a
          # PowerShell/CP1252 double-encode would ship publicly and silently.
          # This mirrors contextmink's own encoding detector: a run is
          # proof-grade mojibake when its characters map to CP1252 bytes that
          # re-decode as valid multi-byte UTF-8. A 2-byte run is trusted only
          # with a Latin-1 lead or when it clusters, so ordinary typography
          # does not trip it. Raw C1 controls are always a defect in authored
          # text.
          python3 - CHANGELOG.md <<'PY'
          import sys

          # CP1252 0x80-0x9F specials, keyed by Unicode code point so this
          # gate does not embed the very characters it guards against.
          SPECIALS = {cp: byte for byte, cp in {
              0x80:0x20AC, 0x82:0x201A, 0x83:0x0192, 0x84:0x201E, 0x85:0x2026,
              0x86:0x2020, 0x87:0x2021, 0x88:0x02C6, 0x89:0x2030, 0x8A:0x0160,
              0x8B:0x2039, 0x8C:0x0152, 0x8E:0x017D, 0x91:0x2018, 0x92:0x2019,
              0x93:0x201C, 0x94:0x201D, 0x95:0x2022, 0x96:0x2013, 0x97:0x2014,
              0x98:0x02DC, 0x99:0x2122, 0x9A:0x0161, 0x9B:0x203A, 0x9C:0x0153,
              0x9E:0x017E, 0x9F:0x0178,
          }.items()}

          def cp1252_byte(ch):
              o = ord(ch)
              if 0xA0 <= o <= 0xFF:
                  return o
              return SPECIALS.get(o)

          def scan(text):
              chars = list(text)
              runs, c1 = [], 0
              i = 0
              while i < len(chars):
                  ch = chars[i]
                  o = ord(ch)
                  if 0x80 <= o <= 0x9F:
                      c1 += 1
                      i += 1
                      continue
                  lead = cp1252_byte(ch)
                  if lead is None:
                      i += 1
                      continue
                  cont = 1 if 0xC2 <= lead <= 0xDF else 2 if 0xE0 <= lead <= 0xEF else 3 if 0xF0 <= lead <= 0xF4 else 0
                  if cont == 0:
                      i += 1
                      continue
                  seq = [lead]
                  for k in range(1, cont + 1):
                      if i + k >= len(chars):
                          break
                      b = cp1252_byte(chars[i + k])
                      if b is None or not (0x80 <= b <= 0xBF):
                          break
                      seq.append(b)
                  if len(seq) != cont + 1:
                      i += 1
                      continue
                  try:
                      dec = bytes(seq).decode('utf-8')
                  except UnicodeDecodeError:
                      i += 1
                      continue
                  strong = cont >= 2 or lead in (0xC2, 0xC3)
                  runs.append([i, cont + 1, strong, ''.join(chars[i:i+cont+1]), dec])
                  i += cont + 1
              kept = []
              for j, r in enumerate(runs):
                  end = r[0] + r[1]
                  neighbor = (j > 0 and runs[j-1][0] + runs[j-1][1] == r[0]) or \
                             (j+1 < len(runs) and runs[j+1][0] == end)
                  if r[2] or neighbor:
                      kept.append(r)
              return kept, c1

          text = open(sys.argv[1], encoding='utf-8').read()
          kept, c1 = scan(text)
          if kept or c1:
              print(f"::error::{sys.argv[1]} carries encoding artifacts: "
                    f"{len(kept)} double-encoded run(s), {c1} raw C1 control(s)")
              for r in kept[:5]:
                  line = text[:r[0]].count('\n') + 1
                  print(f"  line {line}: {r[3]!r} is double-encoded UTF-8 for {r[4]!r}")
              sys.exit(1)
          print("CHANGELOG.md encoding is clean")
          PY

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          # Keep a Changelog headings: "## [x.y.z] - date". Capture the body
          # up to the next "## " heading; fail if the section is missing so a
          # release can never ship without written notes.
          awk -v heading="## [${VERSION}]" '
            index($0, heading) == 1 { found = 1; next }
            /^## / { if (found) exit }
            found { print }
          ' CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "CHANGELOG.md has no section for ${VERSION}; add one before releasing." >&2
            exit 1
          fi
          {
            echo ""
            echo "Prebuilt CLI archives for Windows x64, macOS Intel, macOS ARM, and Linux x64. Each archive includes the contextmink binary, setup docs, templates, licenses, a manifest, and a SHA-256 checksum; the Windows archive also carries contextmink-bridge."
          } >> release_body.md
          cat release_body.md
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "contextmink ${{ steps.ver.outputs.version }}" \
            --notes-file release_body.md \
            release-assets/*
